name: Test

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm run test:run
        env:
          # Unit tests always run. Integration tests (server/__tests__/api.integration.test.ts)
          # run only when DATABASE_URL is set; add a Postgres service and DATABASE_URL to enable them.
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-secret' }}
